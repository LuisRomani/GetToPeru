version: '3.8'

services:
  web:
    image: gettoperu:latest
    container_name: gettoperu-web
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ./public_html:/var/www/html
    environment:
      - PHP_MEMORY_LIMIT=512M
      - PHP_MAX_EXECUTION_TIME=120
    restart: always
    networks:
      - gettoperu-network
    depends_on:
      - postfix
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  postfix:
    image: boky/postfix:latest
    container_name: gettoperu-postfix
    hostname: mail.gettoperu.local
    environment:
      MAILNAME: gettoperu.local
      ALLOWED_SENDER_DOMAINS: gettoperu.local
    volumes:
      - postfix_data:/var/spool/postfix
    restart: always
    networks:
      - gettoperu-network

networks:
  gettoperu-network:
    driver: bridge

volumes:
  postfix_data:
    driver: local